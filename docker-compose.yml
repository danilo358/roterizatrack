version: '3.8'

services:
  db-management:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: management_development
    volumes:
      - pgdata_management:/var/lib/postgresql/data

  db-routing:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: routing_development
    volumes:
      - pgdata_routing:/var/lib/postgresql/data

  management-service:
    build: ./management-service
    command: bash -c "bundle exec rails db:prepare && bundle exec rails db:seed && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - ./management-service:/app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db-management
      DB_USER: postgres
      DB_PASSWORD: password
      RAILS_ENV: development
    depends_on:
      - db-management

  routing-service:
    build: ./routing-service
    volumes:
      - ./routing-service:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    environment:
      MANAGEMENT_SERVICE_URL: http://management-service:3000
      PORT: 3001
    depends_on:
      - management-service

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - management-service
      - routing-service

volumes:
  pgdata_management:
  pgdata_routing:
